{% load static %}
{% block css %}
<link href="{% static 'css/awards.css' %}" rel="stylesheet" media="print" onload="this.media = 'all'" />
{% endblock css %}
{% block body %}
<section class="award-sectionnew">
    <div class="container">
        <div class="row align-items-center justify-content-center layout-section">
            <div class="col-lg-2 col-md-3 text-section">
                <h2>Winning Never Stops</h2>
            </div>
            <div class="col-lg-9 col-xl-10 col-md-9 card-section">
                <div class="swiper AwardSwiper">
                    <div class="swiper-wrapper">
                        {% for award in awards %}
                        <div class="swiper-slide">
                            <div class="card">
                                <img src="{{ award.image.url }}"
                                    class="img-fluid" width="400" height="400" alt="award-img" />
                                <div class="card-body d-flex align-items-center justify-content-center gap-2">
                                    <img src="{% static 'award-icon.png' %}" 
                                        class="award-custom-icon flex-shrink-0"
                                        alt="icon" />
                                    <p class="card-text mb-0">
                                        {{ award.name }}
                                    </p>
                                </div>
                            </div>
                        </div>
                        {% endfor %}
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock body %}
{% block js %}
<script>
    window.addEventListener('load', () => {
        const BASE_SPEED = 60; // px per second
        const SLOW_SPEED = 20;

        let targetSpeed = BASE_SPEED;
        let currentSpeed = BASE_SPEED;
        let position = 0;
        let lastTime = performance.now();

        const swiper = new Swiper('.AwardSwiper', {
            slidesPerView: 'auto',
            allowTouchMove: true,
            loop: false,
            speed: 0,
        });

        const wrapper = swiper.wrapperEl;
        const swiperEl = swiper.el;

        // DUPLICATE SLIDES ONCE
        const slides = [...wrapper.children];
        slides.forEach((slide) => wrapper.appendChild(slide.cloneNode(true)));

        const halfWidth = wrapper.scrollWidth / 2;

        function animate(now) {
            const delta = (now - lastTime) / 1000; // seconds
            lastTime = now;

            // Smooth speed interpolation
            currentSpeed += (targetSpeed - currentSpeed) * 0.08;

            position -= currentSpeed * delta;

            if (Math.abs(position) >= halfWidth) {
                position = 0;
            }

            wrapper.style.transform = `translate3d(${position}px,0,0)`;

            requestAnimationFrame(animate);
        }

        requestAnimationFrame(animate);

        // Hover slow motion
        swiperEl.addEventListener('mouseenter', () => {
            targetSpeed = SLOW_SPEED;
        });

        swiperEl.addEventListener('mouseleave', () => {
            targetSpeed = BASE_SPEED;
        });
    });
</script>
{% endblock js %}
