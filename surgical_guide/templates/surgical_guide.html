<!doctype html>
<html lang="en_IN">
    <head>
        <meta charset="utf-8" />
        <meta name="robots" content="noindex, nofollow">
        <meta name="viewport" content="width=device-width,initial-scale=1" />
        {% load static %} {% block seo %} {% endblock %}
        <link
            rel="shortcut icon"
            href="{% static 'favicon.png' %}"
            type="image/x-icon"
        />
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
            integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
            crossorigin="anonymous"
            referrerpolicy="no-referrer"
        />
        <link rel="preload" href="{% static 'css/bootstrap1.min.css' %}" as="style" />
        <link rel="stylesheet" href="{% static 'css/bootstrap1.min.css' %}" />
        <link rel="stylesheet" href="{% static 'css/new_form.css' %}" />
    </head>

    <body>
        <section class="form_section">
            <div class="container">
                <div class="row form_main_row">
                    <div class="contact-logo">
                        <img
                            src="{% static 'img/NEW_LOGO_CONTECT_FORM.png' %}"
                            alt="Advance Dental Export Logo"
                        />
                    </div>
                    <form
                        action="{% url 'surgical_guide' %}"
                        class="custom-form w-100"
                        method="post"
                    >
                        {% csrf_token %}
                        <div class="row gx-5 gy-4">
                            <!--Row 0-->
                            <div class="col-md-6 form-group mt-md-5">
                                <label class="custom-form-label"
                                    >Doctor Name *</label
                                >
                                <input
                                    type="text"
                                    name="doctor_name"
                                    class="form-control custom-form-control"
                                    required
                                />
                            </div>
                            <div class="col-md-6 form-group mt-md-5">
                                <label class="custom-form-label"
                                    >Patient Name *</label
                                >
                                <input
                                    type="text"
                                    name="patient_name"
                                    class="form-control custom-form-control"
                                    required
                                />
                            </div>
                            <!-- Row 2 -->
                            <div class="col-md-6 form-group mt-md-5">
                                <label class="custom-form-label">Contact Number</label>
                                <input
                                    type="text"
                                    name="contact_number"
                                    class="form-control custom-form-control"
                                />
                            </div>
                            <div class="col-md-6 form-group d-flex flex-column">
                                <label class="custom-form-label">Jaw Information</label>
                                <div
                                    class="d-flex align-items-center gap-5 mt-2 chekbox_row"
                                >
                                    <div
                                        class="form-check custom-checkbox-wrapper d-flex align-items-center"
                                    >
                                        <input
                                            class="form-check-input custom-checkbox m-0"
                                            type="checkbox"
                                            value="maxilla"
                                            name="jaw_information"
                                            id="maxilla"
                                        />
                                        <label
                                            class="form-check-label custom-form-checkbox-label"
                                            for="maxilla"
                                            >Maxilla</label
                                        >
                                    </div>
                                    <div
                                        class="form-check custom-checkbox-wrapper d-flex align-items-center"
                                    >
                                        <input
                                            class="form-check-input custom-checkbox m-0"
                                            type="checkbox"
                                            value="mandible"
                                            name="jaw_information"
                                            id="mandible"
                                        />
                                        <label
                                            class="form-check-label custom-form-checkbox-label"
                                            for="mandible"
                                            >Mandible</label
                                        >
                                    </div>
                                </div>
                            </div>
                            <!-- Row 1 -->
                            <div class="col-md-6 form-group mt-md-5">
                                <label class="custom-form-label"
                                    >Preferred Implant Company</label
                                >
                                <input
                                    type="text"
                                    name="preferred_implant_company"
                                    class="form-control custom-form-control"
                                />
                            </div>
                            <div class="col-md-6 form-group mt-md-5">
                                <label class="custom-form-label"
                                    >Implant Name (Subtype)</label
                                >
                                <input
                                    type="text"
                                    name="implant_name"
                                    class="form-control custom-form-control"
                                />
                            </div>

                            <!-- Row 3 -->
                            <div class="col-md-6 form-group">
                                <label class="custom-form-label"
                                    >Desired Implant Location</label
                                >
                                <input
                                    type="text"
                                    name="desired_implant_location"
                                    class="form-control custom-form-control"
                                />
                            </div>
                            <div class="col-md-6 form-group">
                                <label class="custom-form-label">Preferred Size</label>
                                <input
                                    type="text"
                                    name="preferred_size"
                                    class="form-control custom-form-control"
                                />
                            </div>

                            <!-- Row 4 -->
                            <div class="col-md-6 form-group">
                                <label class="custom-form-label"
                                    >Increase A/P spread using angled Implants</label
                                >
                                <input
                                    type="text"
                                    name="ap_spread_angle_implant"
                                    class="form-control custom-form-control mt-1"
                                />
                            </div>
                            <div class="col-md-6 form-group">
                                <div
                                    class="d-flex justify-content-between align-items-center mb-2"
                                >
                                    <label class="custom-form-label mb-0"
                                        >Immediate Extractions ?</label
                                    >
                                    <div class="d-flex gap-4 yes_no_chekbox">
                                        <div
                                            class="form-check custom-checkbox-wrapper d-flex align-items-center"
                                        >
                                            <input
                                                class="form-check-input custom-checkbox m-0"
                                                type="radio"
                                                value="True"
                                                name="immediate_extractions"
                                                id="immExtYes"
                                            />
                                            <label
                                                class="form-check-label custom-form-checkbox-label"
                                                for="immExtYes"
                                                >Yes</label
                                            >
                                        </div>
                                        <div
                                            class="form-check custom-checkbox-wrapper d-flex align-items-center"
                                        >
                                            <input
                                                class="form-check-input custom-checkbox m-0"
                                                type="radio"
                                                value="False"
                                                name="immediate_extractions"
                                                id="immExtNo"
                                            />
                                            <label
                                                class="form-check-label custom-form-checkbox-label"
                                                for="immExtNo"
                                                >No</label
                                            >
                                        </div>
                                    </div>
                                </div>
                                <input
                                    type="text"
                                    name="immediate_extractions_notes"
                                    class="form-control custom-form-control"
                                />
                            </div>

                            <!-- Row 5 -->
                            <div class="col-md-6 form-group">
                                <div
                                    class="d-flex justify-content-between align-items-center mb-2"
                                >
                                    <label class="custom-form-label mb-0"
                                        >Bone Grafting</label
                                    >
                                    <div class="d-flex gap-4 yes_no_chekbox">
                                        <div
                                            class="form-check custom-checkbox-wrapper d-flex align-items-center"
                                        >
                                            <input
                                                class="form-check-input custom-checkbox m-0"
                                                type="radio"
                                                value="True"
                                                name="bone_grafting"
                                                id="boneGraftYes"
                                            />
                                            <label
                                                class="form-check-label custom-form-checkbox-label"
                                                for="boneGraftYes"
                                                >Yes</label
                                            >
                                        </div>
                                        <div
                                            class="form-check custom-checkbox-wrapper d-flex align-items-center"
                                        >
                                            <input
                                                class="form-check-input custom-checkbox m-0"
                                                type="radio"
                                                value="False"
                                                name="bone_grafting"
                                                id="boneGraftNo"
                                            />
                                            <label
                                                class="form-check-label custom-form-checkbox-label"
                                                for="boneGraftNo"
                                                >No</label
                                            >
                                        </div>
                                    </div>
                                </div>
                                <input
                                    type="text"
                                    name="bone_grafting_notes"
                                    class="form-control custom-form-control"
                                />
                            </div>
                            <div class="col-md-6 form-group">
                                <div
                                    class="d-flex justify-content-between align-items-center mb-2"
                                >
                                    <label class="custom-form-label mb-0"
                                        >Bone Reduction?</label
                                    >
                                    <div class="d-flex gap-4 yes_no_chekbox">
                                        <div
                                            class="form-check custom-checkbox-wrapper d-flex align-items-center"
                                        >
                                            <input
                                                class="form-check-input custom-checkbox m-0"
                                                type="radio"
                                                value="True"
                                                name="bone_reduction"
                                                id="boneRedYes"
                                            />
                                            <label
                                                class="form-check-label custom-form-checkbox-label"
                                                for="boneRedYes"
                                                >Yes</label
                                            >
                                        </div>
                                        <div
                                            class="form-check custom-checkbox-wrapper d-flex align-items-center"
                                        >
                                            <input
                                                class="form-check-input custom-checkbox m-0"
                                                type="radio"
                                                value="False"
                                                name="bone_reduction"
                                                id="boneRedNo"
                                            />
                                            <label
                                                class="form-check-label custom-form-checkbox-label"
                                                for="boneRedNo"
                                                >No</label
                                            >
                                        </div>
                                    </div>
                                </div>
                                <input
                                    type="text"
                                    name="bone_reduction_notes"
                                    class="form-control custom-form-control"
                                />
                            </div>

                            <!-- Row 6 -->
                            <div class="col-md-6 form-group">
                                <label class="custom-form-label"
                                    >Surgical Drill Kit to Be Used</label
                                >
                                <input
                                    type="text"
                                    name="surgical_drill_kit"
                                    class="form-control custom-form-control"
                                />
                            </div>
                            <div class="col-md-6 form-group">
                                <label class="custom-form-label"
                                    >Surgery Date (if Any)</label
                                >
                                <input
                                    type="date"
                                    name="surgery_date"
                                    class="form-control custom-form-control"
                                />
                            </div>

                            <!-- Row 7 -->
                            <div class="col-md-6 form-group mt-md-5">
                                <label class="custom-form-label"
                                    >Provisional Planning?</label
                                >
                                <textarea
                                    type="text"
                                    name="provisional_planning"
                                    class="form-control custom-form-control custom-textarea"
                                ></textarea>
                            </div>
                            <div class="col-md-6 form-group mt-md-5">
                                <label class="custom-form-label">Prosthetic Plan</label>
                                <textarea
                                    type="text"
                                    name="prosthetic_plan"
                                    class="form-control custom-form-control custom-textarea"
                                ></textarea>
                            </div>
                            <div class="col-12">
                                <div class="text-center">
                                    <button type="submit" class="submit-btn">
                                        <span class="btn-text">Submit</span>
                                        <span class="btn-loader"></span>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </section>
        <section class="form_bottom_section">
            <picture>
                <source
                    media="(max-width: 440px)"
                    srcset="{% static 'img/mobile_form_bottom_image.png' %}"
                />
                <img
                    src="{% static 'img/form_bottom_image.png' %}"
                    class="img-fluid responsive-img"
                    alt=""
                />
            </picture>
        </section>
        <div id="thankYouPopup" class="thankyou-overlay">
            <div class="thankyou-box">
                <!-- ❌ Close Button -->
                <button class="popup-close" id="popupCloseBtn">&times;</button>

                <h2>THANK YOU</h2>

                <p>
                    Thank you for submitting your details. We have received your request successfully.<br />
                    <br />
                    If you need any assistance or would like to contact us, please find our contact details below
                </p>

                <div class="thankyou-contact">
                    <div class="contact-item">
                        <a
                            href="tel:+919512381616"
                            style="text-decoration: none; color: inherit"
                        >
                            <i
                                class="fa-solid fa-phone"
                                style="color: rgb(27, 137, 118)"
                            ></i>
                            <span>+91 95123 81616</span>
                        </a>
                    </div>

                    <div class="contact-item">
                        <a
                            href="mailto:sg@advancedentalexport.com"
                            style="text-decoration: none; color: inherit"
                        >
                            <i
                                class="fa-solid fa-envelope"
                                style="color: rgb(27, 137, 118)"
                            ></i>
                            <span>sg@advancedentalexport.com</span>
                        </a>
                    </div>
                </div>
            </div>
        </div>
        <script>
            const form = document.querySelector('form');
            const button = document.querySelector('.submit-btn');
            const popup = document.getElementById('thankYouPopup');
            const closeBtn = document.getElementById('popupCloseBtn');

            // 👉 button click / form submit
            form.addEventListener('submit', function (e) {
                e.preventDefault(); // ❌ stop Django submit
                const doctorName = form.querySelector('[name="doctor_name"]').value.trim();
                const patientName = form.querySelector('[name="patient_name"]').value.trim();
                if (!doctorName || !patientName) {
                    alert('Doctor Name and Patient Name are required.');
                    return;
                }
                // 🔵 button loader ON
                button.classList.add('loading');
                button.disabled = true;
                
                let formData = new FormData(form);

                fetch(form.action, {
                    method: 'POST',
                    body: formData,
                    headers: {
                        'X-Requested-With': 'XMLHttpRequest'
                    }
                })
                .then(response => response.json())
                .then(data => {
                    button.classList.remove('loading');
                    button.disabled = false;
                    
                    if (data.success) {
                        popup.style.display = 'flex';
                        form.reset();
                    } else {
                        alert('Please check the form inputs and try again.');
                    }
                })
                .catch(error => {
                    button.classList.remove('loading');
                    button.disabled = false;
                    alert('An unexpected error occurred.');
                });
            });

            // ❌ close button
            closeBtn.addEventListener('click', function (e) {
                e.stopPropagation();
                popup.style.display = 'none';
            });

            // 👉 click outside close
            popup.addEventListener('click', function () {
                popup.style.display = 'none';
            });

            // 👉 prevent close when clicking inside box
            document
                .querySelector('.thankyou-box')
                .addEventListener('click', function (e) {
                    e.stopPropagation();
            });
        </script>
    </body>
</html>
